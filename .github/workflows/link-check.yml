name: Link Check

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install system dependencies for social cards
        run: sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-glightbox \
            mkdocs-git-revision-date-localized \
            mkdocs-minify-plugin \
            pillow \
            cairosvg

      - name: Build site
        run: mkdocs build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: '--verbose --no-progress --exclude "fonts\.googleapis\.com" --exclude "fonts\.gstatic\.com" --exclude "assetstore\.unity\.com" site/'
          fail: true
