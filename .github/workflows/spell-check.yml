name: Spell Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: codespell-project/actions-codespell@v2
        with:
          path: docs
          ignore_words_list: forger,forgers,stencil,stencils,prefab,prefabs,asmdef,scriptableobject,scriptableobjects,gameobject,gameobjects,navmesh,worldforger,villageforger,prefabforger,stamper,spawner,gizmo,gizmos,lerp
          skip: '*.png,*.jpg,*.gif,*.svg,*.ico,*.webp'
