site_name: World Forger
site_url: https://b2c3d.github.io/World-Forger/
site_description: World Forger — Procedural world generation toolkit for Unity
site_author: B2C3D


extra_css:
  - stylesheets/custom.css

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Segoe UI
    code: Cascadia Code
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
    - announce.dismiss

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Village Forger: village-forger.md
  - Village Profile: village-profile.md
  - Prefab Forger: prefab-forger.md
  - Stencil Graph: stencil-graph.md
  - Tools: tools.md
  - Scripting: scripting.md
  - Advanced: advanced.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true
  - social:
      cards_layout_options:
        background_color: "#1E1E1E"
        color: "#44AAE6"

extra:
  social:
    - icon: fontawesome/brands/unity
      link: https://assetstore.unity.com
